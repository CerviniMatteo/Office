# src/main/resources/application.yml
spring:
  profiles:
    active: prod   # default profile

---

# Production profile: H2
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:h2:mem:assignment3;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

---

# Test profile: H2 in-memory
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

