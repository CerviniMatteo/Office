spring:
  profiles:
    active: prod

---

# Production profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:h2:mem:assignment3;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: tuapassword
    key-store-type: PKCS12
    key-alias: myalias

---

# Test profile
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop